name: Static Safety Audit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  static-safety:
    name: EA static safety checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run static repository safety audit
        run: python work/static_repo_safety_audit.py

      - name: Run static MQL compile preflight
        run: python work/static_mql_compile_preflight.py

  powershell-validation:
    name: Report and MT5 safety smoke tests
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run report parser smoke test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\test_report_collector_parser.ps1

      - name: Run external micro-decision smoke test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\test_external_mt5_micro_decision.ps1

      - name: Run risk-adjusted micro-batch smoke test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\test_risk_adjusted_micro_batch.ps1

      - name: Run profit-search generator smoke test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\test_generate_profit_search_configs.ps1

      - name: Run report import preflight smoke test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\test_report_import_preflight.ps1

      - name: Run offline refresh quiet-mode smoke test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\test_offline_refresh_quiet_mode.ps1

      - name: Bootstrap CI risk-adjusted handoff
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\bootstrap_ci_risk_adjusted_handoff.ps1

      - name: Build risk-adjusted external MT5 package
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\build_external_mt5_validation_package.ps1 -EaSourcePath Professional_XAUUSD_EA.mq5

      - name: Run risk-adjusted handoff integrity audit
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\audit_handoff_config_integrity.ps1 -ManifestPath outputs\risk_adjusted_micro_handoff\HANDOFF_MANIFEST.csv -ZipPath outputs\risk_adjusted_micro_handoff.zip

      - name: Run external MT5 package audit
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\test_external_mt5_validation_package.ps1

      - name: Run MT5 local safety audit
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File work\audit_mt5_local_safety.ps1
